spring:
  application:
    name: minikafka
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:minikafka}
    username: ${POSTGRES_USER:minikafka}
    password: ${POSTGRES_PASSWORD:minikafka}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

minikafka:
  storage:
    root: ${MINIKAFKA_STORAGE_ROOT:data/minikafka-logs}
  tcp:
    enabled: ${MINIKAFKA_TCP_ENABLED:true}
    host: ${MINIKAFKA_TCP_HOST:0.0.0.0}
    port: ${MINIKAFKA_TCP_PORT:9092}
    worker-threads: ${MINIKAFKA_TCP_WORKERS:8}
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    ttl-minutes: ${JWT_TTL_MINUTES:240}

logging:
  level:
    com.minikafka: INFO
